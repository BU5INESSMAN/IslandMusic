services:
  bot:
    build: .
    container_name: islandmusic-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./cookies.txt:/app/cookies.txt:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
